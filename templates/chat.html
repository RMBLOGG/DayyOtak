{% extends "base.html" %}

{% block title %}Live Chat — DAYYdesu{% endblock %}

{% block extra_css %}
<style>
    /* ══════════════════════════════════════════
       LIVE CHAT — CYBER THEME
       Selaras penuh dengan base.html
    ══════════════════════════════════════════ */

    /* Override main-content padding agar chat full-height */
    .main-content { padding-bottom: 0 !important; overflow: hidden; }
    .content-wrapper { padding: 0 !important; overflow: hidden; }

    /* ── Chat wrapper: fixed fill antara topbar & bottom-nav ── */
    .chat-wrap {
        position: fixed;
        top: 56px;
        bottom: 58px;
        left: 0;
        right: 0;
        display: flex;
        flex-direction: column;
        background: var(--c-bg);
        z-index: 10;
    }

    /* ── Chat header bar ── */
    .chat-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.6rem 1rem;
        background: var(--c-elevated);
        border-bottom: 1px solid var(--c-border);
        flex-shrink: 0;
        position: relative;
    }
    .chat-topbar::after {
        content: '';
        position: absolute;
        bottom: -1px; left: 10%; right: 10%;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--c-cyan), transparent);
        box-shadow: 0 0 8px rgba(64,200,255,0.4);
    }

    .chat-title {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-family: var(--font-hud);
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 1px;
        color: var(--c-text);
    }
    .chat-title i { color: var(--c-cyan); font-size: 0.95rem; }

    .live-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        background: rgba(239,68,68,0.12);
        border: 1px solid rgba(239,68,68,0.35);
        color: #ef4444;
        font-family: var(--font-hud);
        font-size: 0.58rem;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 2px 8px;
        border-radius: 3px;
    }
    .live-badge::before {
        content: '';
        width: 5px; height: 5px;
        border-radius: 50%;
        background: #ef4444;
        box-shadow: 0 0 6px #ef4444;
        animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .chat-online {
        font-family: var(--font-hud);
        font-size: 0.68rem;
        color: var(--c-text-dim);
        letter-spacing: 0.5px;
    }
    .chat-online span { color: #22c55e; }

    /* ── Messages area ── */
    #chatMessages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        scrollbar-width: thin;
        scrollbar-color: var(--c-border) transparent;
        background-image:
            linear-gradient(var(--c-grid) 1px, transparent 1px),
            linear-gradient(90deg, var(--c-grid) 1px, transparent 1px);
        background-size: 40px 40px;
    }
    #chatMessages::-webkit-scrollbar { width: 3px; }
    #chatMessages::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 2px; }

    /* Loading */
    .chat-loading {
        text-align: center;
        font-family: var(--font-hud);
        font-size: 0.78rem;
        letter-spacing: 1px;
        color: var(--c-text-dim);
        padding: 2rem 0;
        animation: pulse-op 1.5s infinite;
    }
    @keyframes pulse-op { 0%,100%{opacity:.5} 50%{opacity:1} }
    .chat-loading i { color: var(--c-cyan); margin-right: 0.4rem; }

    /* Empty state */
    .chat-empty {
        text-align: center;
        padding: 2.5rem 1rem;
        color: var(--c-text-dim);
        font-family: var(--font-hud);
    }
    .chat-empty i {
        font-size: 2.5rem;
        color: var(--c-cyan);
        opacity: 0.25;
        display: block;
        margin-bottom: 0.75rem;
    }
    .chat-empty p { font-size: 0.82rem; letter-spacing: 0.5px; margin: 0; line-height: 1.7; }

    /* ── Message bubble ── */
    .msg {
        display: flex;
        gap: 0.6rem;
        animation: msgIn .22s ease;
        max-width: 88%;
    }
    @keyframes msgIn {
        from { opacity:0; transform:translateY(8px); }
        to   { opacity:1; transform:none; }
    }
    .msg.me    { flex-direction: row-reverse; align-self: flex-end; }
    .msg.other { align-self: flex-start; }

    /* Avatar */
    .msg-avatar {
        width: 34px; height: 34px;
        border-radius: 4px;
        object-fit: cover;
        border: 1px solid var(--c-border);
        flex-shrink: 0;
        align-self: flex-end;
    }
    .msg-avatar-placeholder {
        width: 34px; height: 34px;
        border-radius: 4px;
        background: linear-gradient(135deg, var(--c-cyan), var(--c-purple));
        display: flex; align-items: center; justify-content: center;
        font-family: var(--font-hud);
        font-size: 0.85rem; font-weight: 700;
        color: #fff;
        flex-shrink: 0;
        align-self: flex-end;
        border: 1px solid var(--c-cyan-35);
        box-shadow: 0 0 10px rgba(64,200,255,0.2);
    }

    /* Bubble group */
    .msg-group { display: flex; flex-direction: column; gap: 0.2rem; max-width: 100%; }
    .msg.me .msg-group { align-items: flex-end; }

    .msg-sender {
        font-family: var(--font-hud);
        font-size: 0.65rem; font-weight: 700;
        letter-spacing: 0.5px;
        color: var(--c-cyan); opacity: 0.75;
        padding: 0 0.35rem;
    }
    .msg.me .msg-sender { color: #22c55e; }

    .msg-bubble {
        background: var(--c-elevated);
        border: 1px solid var(--c-border);
        border-radius: 0 10px 10px 10px;
        padding: 0.6rem 0.875rem;
        font-family: var(--font-body);
        font-size: 0.875rem;
        line-height: 1.55;
        color: var(--c-text);
        word-break: break-word;
        transition: border-color .2s, box-shadow .2s;
    }
    .msg-bubble:hover {
        border-color: var(--c-cyan-35);
        box-shadow: 0 0 12px rgba(64,200,255,0.08);
    }
    .msg.me .msg-bubble {
        background: rgba(64,200,255,0.08);
        border-color: var(--c-cyan-20);
        border-radius: 10px 0 10px 10px;
        box-shadow: 0 0 16px rgba(64,200,255,0.07);
    }

    .msg-time {
        font-family: var(--font-hud);
        font-size: 0.58rem;
        color: var(--c-text-dim); opacity: 0.5;
        padding: 0 0.35rem;
        letter-spacing: 0.3px;
    }

    /* System divider */
    .msg-system {
        text-align: center;
        font-family: var(--font-hud);
        font-size: 0.62rem;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--c-text-dim); opacity: 0.45;
        padding: 0.25rem 0;
        display: flex; align-items: center; gap: 0.5rem;
    }
    .msg-system::before, .msg-system::after {
        content: ''; flex: 1; height: 1px; background: var(--c-border);
    }

    /* ── Input area ── */
    .chat-input-area {
        display: flex; align-items: flex-end; gap: 0.5rem;
        padding: 0.75rem 1rem;
        background: var(--c-elevated);
        border-top: 1px solid var(--c-border);
        flex-shrink: 0;
        position: relative;
    }
    .chat-input-area::before {
        content: '';
        position: absolute;
        top: -1px; left: 10%; right: 10%;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--c-cyan-20), transparent);
    }

    .chat-textarea {
        flex: 1;
        background: var(--c-cyan-08);
        border: 1px solid var(--c-border);
        border-radius: 6px;
        color: var(--c-text);
        font-family: var(--font-body);
        font-size: 0.875rem;
        padding: 0.6rem 0.875rem;
        resize: none;
        height: 42px; max-height: 100px;
        line-height: 1.45;
        outline: none;
        transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .chat-textarea::placeholder { color: var(--c-text-dim); opacity: 0.6; }
    .chat-textarea:focus {
        border-color: var(--c-cyan);
        background: var(--c-cyan-12);
        box-shadow: 0 0 0 2px rgba(64,200,255,0.1), 0 0 16px rgba(64,200,255,0.08);
    }

    .chat-send-btn {
        width: 42px; height: 42px; flex-shrink: 0;
        background: linear-gradient(135deg, var(--c-cyan), var(--c-purple));
        border: none; border-radius: 6px;
        color: #fff; font-size: 0.95rem;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        transition: all .22s ease;
        box-shadow: 0 0 14px rgba(64,200,255,0.3);
    }
    .chat-send-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 0 22px rgba(64,200,255,0.5);
    }
    .chat-send-btn:disabled {
        background: var(--c-elevated);
        border: 1px solid var(--c-border);
        box-shadow: none; cursor: not-allowed; opacity: 0.45;
    }

    /* Char count */
    .char-hint {
        position: absolute;
        bottom: 0.3rem; right: 4.5rem;
        font-family: var(--font-hud);
        font-size: 0.56rem;
        color: var(--c-text-dim); opacity: 0.4;
        letter-spacing: 0.3px; pointer-events: none;
    }
    .char-hint.warn { color: #f59e0b; opacity: .8; }
    .char-hint.over { color: #ef4444; opacity: 1; }

    /* ── Reply preview bar ── */
    .reply-preview {
        display: none;
        align-items: center;
        gap: 0.6rem;
        padding: 0.5rem 1rem;
        background: var(--c-cyan-08);
        border-top: 1px solid var(--c-cyan-20);
        border-left: 3px solid var(--c-cyan);
        position: relative;
        flex-shrink: 0;
        animation: slideUp .18s ease;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .reply-preview.show { display: flex; }
    .reply-preview-text {
        flex: 1;
        min-width: 0;
    }
    .reply-preview-label {
        font-family: var(--font-hud);
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 1px;
        color: var(--c-cyan);
        margin-bottom: 2px;
    }
    .reply-preview-msg {
        font-family: var(--font-body);
        font-size: 0.78rem;
        color: var(--c-text-dim);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .reply-cancel {
        width: 24px; height: 24px;
        background: var(--c-cyan-12);
        border: 1px solid var(--c-border);
        border-radius: 4px;
        color: var(--c-text-dim);
        font-size: 0.7rem;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: all .2s;
    }
    .reply-cancel:hover { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.1); }

    /* Quoted reply inside bubble */
    .msg-reply-quote {
        background: var(--c-cyan-08);
        border-left: 3px solid var(--c-cyan);
        border-radius: 4px;
        padding: 0.35rem 0.6rem;
        margin-bottom: 0.4rem;
        font-size: 0.75rem;
    }
    .msg-reply-quote .quote-name {
        font-family: var(--font-hud);
        font-size: 0.6rem;
        font-weight: 700;
        color: var(--c-cyan);
        margin-bottom: 2px;
    }
    .msg-reply-quote .quote-text {
        color: var(--c-text-dim);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-family: var(--font-body);
    }
    .msg.me .msg-reply-quote { border-left-color: #22c55e; }
    .msg.me .msg-reply-quote .quote-name { color: #22c55e; }

    /* Swipe indicator icon */
    .msg-swipe-icon {
        position: absolute;
        top: 50%; transform: translateY(-50%);
        font-size: 0.85rem;
        color: var(--c-cyan);
        opacity: 0;
        transition: opacity .15s;
        pointer-events: none;
    }
    .msg.me  .msg-swipe-icon { right: -28px; }
    .msg.other .msg-swipe-icon { left: -28px; }

    /* ── Context menu (long press) ── */
    .ctx-menu {
        position: fixed;
        z-index: 999;
        background: var(--c-elevated);
        border: 1px solid var(--c-border);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px var(--c-cyan-12);
        min-width: 160px;
        animation: ctxIn .15s cubic-bezier(.16,1,.3,1);
        transform-origin: top center;
    }
    @keyframes ctxIn {
        from { opacity:0; transform:scale(0.9) translateY(-4px); }
        to   { opacity:1; transform:scale(1) translateY(0); }
    }
    .ctx-item {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.7rem 1rem;
        font-family: var(--font-hud);
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: var(--c-text);
        cursor: pointer;
        transition: background .15s;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
    }
    .ctx-item i { font-size: 0.8rem; width: 16px; color: var(--c-cyan); }
    .ctx-item:hover { background: var(--c-cyan-08); }
    .ctx-item + .ctx-item { border-top: 1px solid var(--c-border); }
    .ctx-item.danger { color: #ef4444; }
    .ctx-item.danger i { color: #ef4444; }
    .ctx-item.danger:hover { background: rgba(239,68,68,0.08); }

    /* Highlight bubble saat ctx menu aktif */
    .msg-bubble.ctx-active {
        border-color: var(--c-cyan-35) !important;
        box-shadow: 0 0 16px rgba(64,200,255,0.2) !important;
    }

    /* Dim overlay saat ctx menu terbuka */
    .ctx-overlay {
        display: none;
        position: fixed; inset: 0;
        z-index: 998;
    }
    .ctx-overlay.show { display: block; }

    /* Light theme */
    body.light-theme .chat-topbar      { background: var(--c-elevated); }
    body.light-theme .msg-bubble       { background: var(--c-card); }
    body.light-theme .msg.me .msg-bubble { background: rgba(0,144,204,0.07); }
    body.light-theme .chat-input-area  { background: var(--c-elevated); }
    body.light-theme .chat-textarea    { background: rgba(0,144,204,0.05); }
</style>
{% endblock %}

{% block content %}
<div class="chat-wrap">

    <!-- Header -->
    <div class="chat-topbar">
        <div class="chat-title">
            <i class="fas fa-comments"></i>
            Live Chat
            <span class="live-badge">LIVE</span>
        </div>
        <div class="chat-online">
            <span>●</span> Komunitas DAYYdesu
        </div>
    </div>

    <!-- Messages -->
    <div id="chatMessages">
        <div class="chat-loading" id="chatLoading">
            <i class="fas fa-circle-notch fa-spin"></i>Memuat pesan...
        </div>
    </div>

    <!-- Context Menu Overlay -->
    <div class="ctx-overlay" id="ctxOverlay" onclick="closeCtx()"></div>
    <div class="ctx-menu" id="ctxMenu" style="display:none;">
        <button class="ctx-item" id="ctxReplyBtn" onclick="ctxReply()">
            <i class="fas fa-reply"></i> Balas
        </button>
        <button class="ctx-item danger" id="ctxDeleteBtn" onclick="ctxDelete()">
            <i class="fas fa-trash"></i> Hapus Pesan
        </button>
    </div>

    <!-- Reply Preview -->
    <div class="reply-preview" id="replyPreview">
        <div class="reply-preview-text">
            <div class="reply-preview-label"><i class="fas fa-reply"></i> Membalas</div>
            <div class="reply-preview-msg" id="replyPreviewMsg"></div>
        </div>
        <button class="reply-cancel" onclick="cancelReply()"><i class="fas fa-times"></i></button>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
        <textarea id="chatInput" class="chat-textarea"
                  placeholder="Ketik pesan..."
                  maxlength="500" rows="1"></textarea>
        <span class="char-hint" id="charHint"></span>
        <button class="chat-send-btn" id="chatSendBtn" onclick="sendMsg()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
    const ME      = {{ user | tojson }};
    let lastId    = 0;
    let isSending = false;
    let replyTo   = null; // { id, user_name, message }
    let ctxTarget = null; // pesan yang sedang di-long press

    /* ── Context Menu ── */
    function openCtx(e, m, el) {
        ctxTarget = { m, el };
        const menu    = document.getElementById('ctxMenu');
        const overlay = document.getElementById('ctxOverlay');
        const delBtn  = document.getElementById('ctxDeleteBtn');

        // Tombol hapus hanya muncul untuk pesan sendiri
        delBtn.style.display = m.user_sub === ME.sub ? 'flex' : 'none';

        menu.style.display = 'block';
        overlay.classList.add('show');

        // Posisi menu — pastikan tidak keluar layar
        const vw = window.innerWidth, vh = window.innerHeight;
        const mx = Math.min(e.clientX || e.touches?.[0]?.clientX || vw/2, vw - 170);
        const my = Math.min(e.clientY || e.touches?.[0]?.clientY || vh/2, vh - 120);
        menu.style.left = mx + 'px';
        menu.style.top  = my + 'px';

        // Sedikit highlight bubble
        el.querySelector('.msg-bubble')?.classList.add('ctx-active');
        if (navigator.vibrate) navigator.vibrate(40);
    }
    function closeCtx() {
        const menu    = document.getElementById('ctxMenu');
        const overlay = document.getElementById('ctxOverlay');
        menu.style.display = 'none';
        overlay.classList.remove('show');
        if (ctxTarget) {
            ctxTarget.el.querySelector('.msg-bubble')?.classList.remove('ctx-active');
        }
        ctxTarget = null;
    }
    function ctxReply() {
        if (!ctxTarget) return;
        closeCtx();
        setReply(ctxTarget.m);
    }
    async function ctxDelete() {
        if (!ctxTarget) return;
        const { m, el } = ctxTarget;
        closeCtx();
        // Animasi hapus
        el.style.transition = 'opacity .25s, transform .25s';
        el.style.opacity = '0';
        el.style.transform = 'scale(0.92)';
        try {
            const res  = await fetch(`/api/chat/delete/${m.id}`, { method: 'POST' });
            const json = await res.json();
            if (json.status === 'success') {
                setTimeout(() => el.remove(), 250);
            } else {
                el.style.opacity = '1'; el.style.transform = '';
                alert('Gagal menghapus pesan.');
            }
        } catch(e) {
            el.style.opacity = '1'; el.style.transform = '';
            console.warn(e);
        }
    }

    function esc(s) {
        return String(s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmtTime(iso) {
        return new Date(iso).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    }

    /* ── Reply UI ── */
    function setReply(m) {
        replyTo = m;
        const bar = document.getElementById('replyPreview');
        const txt = document.getElementById('replyPreviewMsg');
        const name = m.user_sub === ME.sub ? 'Kamu' : (m.user_name || 'User');
        txt.textContent = name + ': ' + m.message;
        bar.classList.add('show');
        document.getElementById('chatInput').focus();
    }
    function cancelReply() {
        replyTo = null;
        document.getElementById('replyPreview').classList.remove('show');
    }

    /* ── Build bubble ── */
    function buildBubble(m) {
        const isMe    = m.user_sub === ME.sub;
        const initial = (m.user_name || '?')[0].toUpperCase();
        const avatarHtml = m.user_pic
            ? `<img src="${esc(m.user_pic)}" class="msg-avatar" alt="">`
            : `<div class="msg-avatar-placeholder">${esc(initial)}</div>`;

        // Quote block jika ada reply
        let quoteHtml = '';
        if (m.reply_to_name && m.reply_to_msg) {
            const qname = m.reply_to_sub === ME.sub ? 'Kamu' : esc(m.reply_to_name);
            quoteHtml = `
                <div class="msg-reply-quote">
                    <div class="quote-name">${qname}</div>
                    <div class="quote-text">${esc(m.reply_to_msg)}</div>
                </div>`;
        }

        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'me' : 'other'}`;
        div.dataset.id = m.id;
        div.dataset.msg = m.message;
        div.dataset.name = m.user_name || 'User';
        div.dataset.sub = m.user_sub;
        div.innerHTML = `
            <i class="fas fa-reply msg-swipe-icon" id="si_${m.id}"></i>
            ${avatarHtml}
            <div class="msg-group">
                <div class="msg-sender">${isMe ? 'Kamu' : esc(m.user_name || 'User')}</div>
                <div class="msg-bubble">
                    ${quoteHtml}
                    ${esc(m.message)}
                </div>
                <div class="msg-time">${fmtTime(m.posted_at)}</div>
            </div>`;

        attachSwipe(div, m);
        attachLongPress(div, m);
        return div;
    }

    /* ── Swipe-to-reply (touch + mouse) ── */
    function attachSwipe(el, m) {
        let startX = 0, startY = 0, dx = 0;
        let swiping = false;
        const THRESHOLD = 60;

        function onStart(e) {
            startX = e.touches ? e.touches[0].clientX : e.clientX;
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            dx = 0; swiping = true;
            el.style.transition = 'none';
        }
        function onMove(e) {
            if (!swiping) return;
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            const deltaX = cx - startX;
            const deltaY = Math.abs(cy - startY);
            if (deltaY > 20 && Math.abs(deltaX) < 30) { swiping = false; return; }
            // Arah: kanan untuk pesan sendiri (me), kiri untuk orang lain
            const isMe = el.classList.contains('me');
            if (isMe && deltaX > 0) return;
            if (!isMe && deltaX < 0) return;
            dx = Math.max(-80, Math.min(80, deltaX));
            const limited = isMe ? Math.max(-THRESHOLD, dx) : Math.min(THRESHOLD, dx);
            el.style.transform = `translateX(${limited}px)`;
            const icon = document.getElementById('si_' + m.id);
            if (icon) icon.style.opacity = Math.min(1, Math.abs(limited) / THRESHOLD);
            if (e.cancelable) e.preventDefault();
        }
        function onEnd() {
            if (!swiping) return;
            swiping = false;
            el.style.transition = 'transform .3s cubic-bezier(.25,.8,.25,1)';
            el.style.transform = 'translateX(0)';
            const icon = document.getElementById('si_' + m.id);
            if (icon) icon.style.opacity = 0;
            if (Math.abs(dx) >= THRESHOLD - 10) {
                // Haptic feedback (mobile)
                if (navigator.vibrate) navigator.vibrate(30);
                setReply(m);
            }
            dx = 0;
        }

        el.addEventListener('touchstart', onStart, {passive:true});
        el.addEventListener('touchmove',  onMove,  {passive:false});
        el.addEventListener('touchend',   onEnd);
        el.addEventListener('mousedown',  onStart);
        el.addEventListener('mousemove',  onMove);
        el.addEventListener('mouseup',    onEnd);
        el.addEventListener('mouseleave', onEnd);
    }

    /* ── Long Press to show context menu ── */
    function attachLongPress(el, m) {
        let timer = null;
        const HOLD = 500; // ms

        function start(e) {
            timer = setTimeout(() => {
                timer = null;
                openCtx(e, m, el);
            }, HOLD);
        }
        function cancel() {
            if (timer) { clearTimeout(timer); timer = null; }
        }

        el.addEventListener('touchstart',  start,  {passive:true});
        el.addEventListener('touchend',    cancel);
        el.addEventListener('touchmove',   cancel);
        el.addEventListener('mousedown',   start);
        el.addEventListener('mouseup',     cancel);
        el.addEventListener('mouseleave',  cancel);
        // Prevent context menu default on mobile
        el.addEventListener('contextmenu', e => { e.preventDefault(); openCtx(e, m, el); });
    }

    async function fetchNew() {
        try {
            const res  = await fetch(`/api/chat?after=${lastId}`);
            const json = await res.json();
            if (!json.data?.length) return;

            const box    = document.getElementById('chatMessages');
            const atBot  = box.scrollHeight - box.scrollTop <= box.clientHeight + 80;

            // Remove empty-state if present
            box.querySelector('.chat-empty')?.remove();

            json.data.forEach(m => {
                if (m.id > lastId) lastId = m.id;
                box.appendChild(buildBubble(m));
            });
            if (atBot) box.scrollTop = box.scrollHeight;
        } catch(e) { console.warn(e); }
    }

    async function sendMsg() {
        if (isSending) return;
        const input = document.getElementById('chatInput');
        const msg   = input.value.trim();
        if (!msg || msg.length > 500) return;

        isSending = true;
        document.getElementById('chatSendBtn').disabled = true;
        input.value = '';
        input.style.height = '42px';
        document.getElementById('charHint').textContent = '';

        try {
            const payload = { message: msg };
            if (replyTo) {
                payload.reply_to_id   = replyTo.id;
                payload.reply_to_sub  = replyTo.user_sub;
                payload.reply_to_name = replyTo.user_name || 'User';
                payload.reply_to_msg  = replyTo.message;
            }
            await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            cancelReply();
            await fetchNew();
        } catch(e) { console.warn(e); }

        isSending = false;
        document.getElementById('chatSendBtn').disabled = false;
        input.focus();
    }

    // Enter = kirim, Shift+Enter = newline
    document.getElementById('chatInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });

    // Auto-resize + char counter
    document.getElementById('chatInput').addEventListener('input', function() {
        this.style.height = '42px';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        const len  = this.value.length;
        const hint = document.getElementById('charHint');
        if (len > 400) {
            hint.textContent = `${len}/500`;
            hint.className   = `char-hint ${len >= 500 ? 'over' : 'warn'}`;
        } else {
            hint.textContent = ''; hint.className = 'char-hint';
        }
    });

    async function init() {
        const box = document.getElementById('chatMessages');
        try {
            const res  = await fetch('/api/chat?limit=50');
            const json = await res.json();
            document.getElementById('chatLoading')?.remove();

            if (!json.data?.length) {
                box.innerHTML = `
                    <div class="chat-empty">
                        <i class="fas fa-comments"></i>
                        <p>Belum ada pesan.<br>Jadilah yang pertama chat!</p>
                    </div>`;
            } else {
                json.data.forEach(m => {
                    if (m.id > lastId) lastId = m.id;
                    box.appendChild(buildBubble(m));
                });
                box.scrollTop = box.scrollHeight;
            }
        } catch(e) {
            const el = document.getElementById('chatLoading');
            if (el) el.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Gagal memuat. Coba refresh.';
        }
        setInterval(fetchNew, 2500);
        document.getElementById('chatInput').focus();
    }

    init();

    // Sembunyikan tombol SociaBuzz di halaman chat
    function hideSociabuzzChat() {
        document.querySelectorAll('body > *').forEach(function(el) {
            if (el.tagName === 'SCRIPT' || el.classList.contains('chat-wrap') ||
                el.classList.contains('bottom-nav') || el.classList.contains('menu-modal') ||
                el.classList.contains('menu-overlay') || el.classList.contains('main-content')) return;
            var cs = window.getComputedStyle(el);
            if (cs.position !== 'fixed') return;
            var rect = el.getBoundingClientRect();
            if (rect.width < 300 && rect.height < 120) {
                el.style.setProperty('display', 'none', 'important');
            }
        });
    }
    [300, 800, 1500, 3000].forEach(function(t) { setTimeout(hideSociabuzzChat, t); });
</script>
{% endblock %}
